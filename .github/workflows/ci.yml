name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Load uinput module
        run: sudo modprobe uinput

      - name: Build
        run: cargo build --release

      - name: Build tests
        run: cargo test --no-run

      - name: Run tests
        run: sudo target/debug/deps/input_remapper_rs-* --test-threads=1

  package:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb

      - name: Test .deb package
        run: |
          DEB=$(ls target/debian/*.deb)
          echo "=== Package contents ==="
          dpkg-deb -c "$DEB"

          echo "=== Test install ==="
          sudo dpkg -i "$DEB"

          echo "=== Verify binary ==="
          input-remapper-rs --version

          echo "=== Verify systemd unit ==="
          systemctl cat input-remapper-rs.service

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          generate_release_notes: true
