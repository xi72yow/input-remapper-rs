services:
  dev:
    build:
      context: .
      dockerfile: Containerfile
    devices:
      - /dev/uinput:/dev/uinput
      - /dev/input:/dev/input
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/app/target
      - ./dist:/app/dist
    stdin_open: true
    tty: true

volumes:
  cargo-cache:
  cargo-target:
